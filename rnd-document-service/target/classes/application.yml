spring:
  application:
    name: rnd-document-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/giavico_rnd_documents?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:giavico}
    password: ${SPRING_DATASOURCE_PASSWORD:giavico}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful

giavico:
  cors:
    allowed-origins: ${GIAVICO_CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

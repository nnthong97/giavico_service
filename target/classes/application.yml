spring:
  application:
    name: giavico-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/giavico}
    username: ${SPRING_DATASOURCE_USERNAME:giavico}
    password: ${SPRING_DATASOURCE_PASSWORD:giavico}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:${SERVER_PORT:8080}}
  shutdown: graceful

giavico:
  cors:
    allowed-origins: ${GIAVICO_CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  generate-path: ${OLLAMA_GENERATE_PATH:/api/generate}
  model: ${OLLAMA_MODEL:gemma4}
  timeout: ${OLLAMA_TIMEOUT:PT5M}
  connect-timeout: ${OLLAMA_CONNECT_TIMEOUT:PT10S}

services:
  mysql:
    image: mysql:8.4
    container_name: giavico-mysql
    environment:
      MYSQL_DATABASE: giavico
      MYSQL_USER: giavico
      MYSQL_PASSWORD: giavico
      MYSQL_ROOT_PASSWORD: giavico_root
    ports:
      - "3306:3306"
    volumes:
      - giavico_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugiavico", "-pgiavico"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: giavico-phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: giavico
      PMA_PASSWORD: giavico
    ports:
      - "8088:80"

  giavico-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giavico-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/giavico?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: giavico
      SPRING_DATASOURCE_PASSWORD: giavico
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4
      GIAVICO_CORS_ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  giavico_mysql_data:

services:
  postgres:
    image: postgres:16
    container_name: giavico-postgres
    environment:
      POSTGRES_DB: giavico
      POSTGRES_USER: giavico
      POSTGRES_PASSWORD: giavico
    ports:
      - "5432:5432"
    volumes:
      - giavico_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giavico -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16
    container_name: giavico-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: giavico
    command:
      - sh
      - -c
      - |
        psql -h postgres -U giavico -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'giavico'" | grep -q 1 \
          || psql -h postgres -U giavico -d postgres -c "CREATE DATABASE giavico"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: giavico-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@giavico.example.com
      PGADMIN_DEFAULT_PASSWORD: giavico
    ports:
      - "8088:80"

  giavico-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giavico-service
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/giavico
      SPRING_DATASOURCE_USERNAME: giavico
      SPRING_DATASOURCE_PASSWORD: giavico
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4
      GIAVICO_CORS_ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  giavico_postgres_data:

spring:
  datasource:
    url: jdbc:h2:mem:giavico;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

giavico:
  cors:
    allowed-origins: http://localhost:4200

ollama:
  base-url: http://localhost:11434
  generate-path: /api/generate
  model: test-model
  timeout: PT5S
  connect-timeout: PT1S
